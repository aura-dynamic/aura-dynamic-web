<header 
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [ngClass]="{
    'bg-white/80 backdrop-blur-xl border-b border-gray-200 py-2': isScrolled(),
    'bg-transparent py-6': !isScrolled()
  }"
>
  <div class="max-w-7xl mx-auto px-6 lg:px-12">
    <div class="flex items-center justify-between transition-all duration-500" [ngClass]="isScrolled() ? 'h-12 lg:h-14' : 'h-20 lg:h-24'">
      <a 
        routerLink="/"
        class="flex items-center transition-transform hover:scale-105 active:scale-95"
      >
        <img 
          src="assets/images/company_logos/aura_dynamic.png" 
          alt="Aura Dynamic" 
          class="w-auto transition-all duration-500 object-contain"
          [ngClass]="isScrolled() ? 'h-10 lg:h-12' : 'h-16 lg:h-20'"
        >
      </a>

      <nav class="items-center hidden gap-10 lg:flex">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            [ngClass]="{
              'text-aura-blue': isActive(item.path),
              'text-aura-text-secondary hover:text-aura-blue': !isActive(item.path)
            }"
            class="relative py-2 text-sm font-medium transition-colors group"
          >
            {{ translationService.t(item.key) }}
            <span 
              class="absolute -bottom-1 left-1/2 w-1 h-1 bg-aura-blue rounded-full transform -translate-x-1/2 transition-all duration-300"
              [ngClass]="{
                'opacity-100 scale-100': isActive(item.path),
                'opacity-0 scale-0 group-hover:opacity-40 group-hover:scale-100': !isActive(item.path)
              }"
            ></span>
          </a>
        }

        <div class="w-px h-4 bg-aura-hairline mx-2"></div>

        <button 
          (click)="toggleLanguage()"
          class="px-3 py-1 text-[10px] font-bold tracking-widest transition-all border rounded-full text-aura-text-secondary hover:text-aura-blue hover:border-aura-blue border-aura-hairline"
        >
          {{ translationService.language() === 'fr' ? 'EN' : 'FR' }}
        </button>

        <a
          routerLink="/contact"
          class="aura-pill-blue !text-[11px] !py-2 !px-5 uppercase tracking-wider font-bold"
        >
          {{ translationService.t('nav.cta') }}
        </a>
      </nav>

      <button
        (click)="toggleMobileMenu()"
        class="p-2 transition-colors rounded-lg lg:hidden text-gray-900 hover:bg-gray-100"
        [attr.aria-label]="isMobileMenuOpen() ? 'Close menu' : 'Open menu'"
      >
        @if (isMobileMenuOpen()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        }
      </button>
    </div>
  </div>
</header>

@if (isMobileMenuOpen()) {
  <div class="fixed inset-0 z-40 bg-white/95 backdrop-blur-2xl lg:hidden top-0 transition-all duration-300">
    <div class="flex flex-col items-center justify-center h-full gap-10 p-6">
      <div class="absolute top-6 left-6">
        <img src="assets/images/company_logos/aura_dynamic.png" alt="Aura Dynamic" class="w-auto h-12">
      </div>
      
      <button 
        (click)="closeMobileMenu()"
        class="absolute top-6 right-6 p-2 text-gray-900"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>

      <nav class="flex flex-col items-center gap-6">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            [ngClass]="{
              'text-aura-blue': isActive(item.path),
              'text-aura-text hover:text-aura-blue': !isActive(item.path)
            }"
            class="text-4xl font-light transition-colors relative group"
            (click)="closeMobileMenu()"
          >
            {{ translationService.t(item.key) }}
            @if (isActive(item.path)) {
              <span class="absolute -right-6 top-1/2 -translate-y-1/2 w-2 h-2 bg-aura-blue rounded-full"></span>
            }
          </a>
        }
      </nav>

      <div class="flex flex-col items-center gap-6 mt-8">
        <button 
          (click)="toggleLanguage()"
          class="px-8 py-3 text-sm font-medium transition-colors border rounded-full text-aura-text-secondary hover:text-aura-blue border-aura-hairline"
        >
          {{ translationService.language() === 'fr' ? 'English' : 'Français' }}
        </button>

        <a
          routerLink="/contact"
          class="aura-pill-blue !px-12 !py-4 text-xl font-light"
          (click)="closeMobileMenu()"
        >
          {{ translationService.t('nav.cta') }}
        </a>
      </div>
    </div>
  </div>
}
